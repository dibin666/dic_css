<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DICMusic OPS Dark CSS</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #041813;
            --panel: #10191b;
            --text: #d8e7e3;
            --muted: #8ba19c;
            --accent: #22d1a5;
            --border: rgba(34, 209, 165, .22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 32px;
            background:
                radial-gradient(circle at 20% 0, rgba(34, 209, 165, .18), transparent 28rem),
                linear-gradient(180deg, var(--bg), #07110f);
            color: var(--text);
            font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(720px, 100%);
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(16, 25, 27, .88);
            box-shadow: 0 24px 70px rgba(0, 0, 0, .32);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(28px, 5vw, 42px);
            line-height: 1.1;
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
        }

        code,
        a {
            color: var(--accent);
        }

        code {
            display: block;
            overflow-x: auto;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #07110f;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <main>
        <h1>DICMusic OPS Dark CSS</h1>
        <p>Use this stylesheet URL in DICMusic custom CSS settings:</p>
        <code>https://dibin666.github.io/dic_css/dicmusic_ops_dark.css</code>
    </main>
</body>
</html>
